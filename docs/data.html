<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>数据列表 - 苹果全系列产品口碑采集与可视化分析平台</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body data-page="data">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">苹果口碑分析</a>
        <nav class="nav">
          <a href="index.html">首页</a>
          <a class="active" href="data.html">数据列表</a>
          <a href="analysis.html">分析图表</a>
          <a href="https://github.com/Caspian-kf/iphone-review-analysis" target="_blank" rel="noopener">GitHub 仓库</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="page-title">
        <p class="eyebrow">Multi Product Dataset</p>
        <h1>苹果产品口碑数据列表</h1>
        <p>按产品类别、平台、情感和关键词筛选公开网页采集数据，快速查看不同产品线的口碑样本。</p>
      </section>

      <section class="panel">
        <div class="filters filters-four">
          <label>
            <span>产品类别</span>
            <select id="categoryFilter">
              <option value="">全部类别</option>
            </select>
          </label>
          <label>
            <span>平台筛选</span>
            <select id="platformFilter">
              <option value="">全部平台</option>
            </select>
          </label>
          <label>
            <span>情感筛选</span>
            <select id="sentimentFilter">
              <option value="">全部情感</option>
            </select>
          </label>
          <label>
            <span>关键词搜索</span>
            <input id="keywordSearch" type="search" placeholder="输入 iPhone、iPad、MacBook 等关键词">
          </label>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>产品类别</th>
                <th>平台</th>
                <th>关键词</th>
                <th>标题</th>
                <th>内容</th>
                <th>情感</th>
                <th>发布时间</th>
                <th>原文链接</th>
                <th>采集时间</th>
              </tr>
            </thead>
            <tbody id="reviewsTableBody"></tbody>
          </table>
          <p id="emptyMessage" class="empty-message" hidden>暂无符合条件的数据。</p>
        </div>
      </section>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
