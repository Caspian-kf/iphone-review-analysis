<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>分析图表 - 手机产品口碑分析与可视化平台</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body data-page="analysis">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">口碑分析平台</a>
        <nav class="nav">
          <a href="index.html">首页</a>
          <a href="data.html">数据列表</a>
          <a class="active" href="analysis.html">分析图表</a>
          <a href="https://github.com/Caspian-kf/iphone-review-analysis" target="_blank" rel="noopener">GitHub 仓库</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="page-title">
        <p class="eyebrow">Visual Analysis</p>
        <h1>评论分析图表</h1>
        <p>基于模拟评论数据展示情感占比、平台评论数量和关键词热度分布。</p>
      </section>

      <section class="chart-grid">
        <article class="chart-card">
          <h2>情感占比</h2>
          <div id="sentimentChart" class="chart"></div>
        </article>
        <article class="chart-card">
          <h2>不同平台评论数量</h2>
          <div id="platformChart" class="chart"></div>
        </article>
        <article class="chart-card chart-wide">
          <h2>关键词数量统计</h2>
          <div id="keywordChart" class="chart"></div>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
